server {
    listen 80;
    server_name rewards.8bc.store;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name rewards.8bc.store;

    ssl_certificate /etc/letsencrypt/live/rewards.8bc.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rewards.8bc.store/privkey.pem;

    # SDK and widget assets — long cache
    location /sdk/ {
        proxy_pass http://127.0.0.1:3050;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }

    location /widget/ {
        proxy_pass http://127.0.0.1:3050;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }

    # Admin UI assets — immutable cache
    location /admin/assets/ {
        proxy_pass http://127.0.0.1:3050;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:3050;
        proxy_set_header Host $host;
    }

    # API and everything else
    location / {
        proxy_pass http://127.0.0.1:3050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
