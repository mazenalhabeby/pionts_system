# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    container_name: pionts-db
    ports: !reset []
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pionts_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-pionts_db}
    command: >
      postgres
      -c shared_buffers=512MB
      -c effective_cache_size=1GB
      -c work_mem=16MB
      -c max_connections=100
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  backend:
    container_name: pionts-backend
    ports:
      - "127.0.0.1:3050:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pionts_user}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-pionts_db}?connection_limit=20&pool_timeout=10
      NODE_ENV: production
      PORT: 3000
      NODE_OPTIONS: "--max-old-space-size=1536"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
