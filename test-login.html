<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pionts Widget — Login Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #1a1a1a; }
    main { max-width: 600px; margin: 60px auto; padding: 20px; text-align: center; }
    h1 { font-size: 22px; margin-bottom: 10px; }
    p { font-size: 14px; color: #888; margin-bottom: 30px; }
  </style>
</head>
<body>
  <main>
    <h1>Widget Login Test</h1>
    <p>The loyalty widget should appear in the bottom-right corner. Click it to test the email OTP login flow.</p>
  </main>

  <link rel="stylesheet" href="http://localhost:3000/widget/pionts-widget.css" />
  <script src="http://localhost:3000/widget/pionts-widget.umd.js"></script>
  <script>
    if (window.PiontsWidget && window.PiontsWidget.mount) {
      window.__PIONTS_CONFIG__ = {
        projectKey: 'pk_live_brew_test_public_key_001',
        mode: 'floating',
        apiBase: 'http://localhost:3000',
      };
      window.PiontsWidget.mount(document.body);
    }
  </script>

</html>
